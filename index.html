<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#14181c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Playbook">
<title>Rhinos 2026 – Playbook</title>
<style>
  :root{
    --bg:#14181c; --panel:#1e242a; --panel2:#262e36; --line:#37424c;
    --txt:#e8edf2; --dim:#8fa0ae; --acc:#4da3ff; --grn:#3ba55d;
    --def:#c62828;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
  #app{display:flex;height:100%;overflow:hidden}

  /* Sidebar */
  #side{width:220px;min-width:220px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column}
  #side h1{font-size:15px;margin:0;padding:14px 14px 8px;letter-spacing:.3px}
  #side h1 small{display:block;color:var(--dim);font-weight:400;font-size:11px;margin-top:2px}
  #playList{flex:1;overflow-y:auto;padding:6px}
  .pItem{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;margin-bottom:2px;user-select:none}
  .pItem:hover{background:var(--panel2)}
  .pItem.on{background:var(--panel2);border-color:var(--acc)}
  .pNum{background:#000;color:#fff;border-radius:10px;min-width:26px;height:20px;display:flex;
    align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .pName{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);font-size:13px}
  #sideFoot{padding:8px;border-top:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap}

  /* Main */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  #topbar input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:7px 10px;font-size:14px;width:180px}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:7px 8px;font-size:13px}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    padding:7px 11px;font-size:13px;cursor:pointer;white-space:nowrap}
  button:hover{border-color:var(--acc)}
  button.on{background:var(--acc);border-color:var(--acc);color:#06121f;font-weight:600}
  button.grn{background:var(--grn);border-color:var(--grn);color:#fff;font-weight:600}
  button.warn{color:#ff8a80}
  .sep{width:1px;height:24px;background:var(--line);margin:0 2px}
  .spacer{flex:1}

  /* Field area */
  #fieldWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:10px}
  svg{max-height:100%;max-width:100%;touch-action:none;border-radius:12px;
    box-shadow:0 4px 24px rgba(0,0,0,.45)}

  /* Edit panel */
  #editBar{display:none;align-items:center;gap:6px;padding:8px 12px;background:var(--panel);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  #editBar.show{display:flex}
  #editBar .lbl{color:var(--dim);font-size:12px}
  #selInfo{font-weight:700;min-width:90px}

  #hint{position:fixed;bottom:10px;right:14px;color:var(--dim);font-size:11px;pointer-events:none}

  /* Speicher-Slots */
  #slotBar{display:flex;gap:4px;padding:8px 8px 0;align-items:center}
  #slotBar select{flex:1;min-width:0}
  #slotBar button{padding:6px 8px}

  /* Druck-Overlay */
  #printOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:70;overflow:auto}
  #printOv.show{display:block}
  #printPanel{max-width:660px;margin:24px auto;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:16px}
  #printPanel h3{margin:0 0 10px}
  .pRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .pRow label{color:var(--dim);font-size:12px}
  .pRow input[type=number]{width:64px;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:8px;padding:6px}
  .pRow input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:6px 8px}
  #printPrev{background:#e9ecef;border-radius:8px;padding:8px;overflow:auto;max-height:52vh;margin:10px 0}

  /* Wristband-Karten */
  .wcard{background:#fff;border:0.4mm dashed #888;display:flex;flex-direction:column;
    margin:0 auto 6mm;overflow:hidden;page-break-inside:avoid;box-sizing:border-box}
  .wcHead{display:flex;align-items:center;gap:2mm;padding:1mm 2mm;height:9mm;box-sizing:border-box;
    border-bottom:0.3mm solid #ccc;background:#fff}
  .wcHead img{height:7mm;width:auto}
  .wcHead .t{font-size:3.2mm;font-weight:700;color:#111;white-space:nowrap;overflow:hidden}
  .wcHead .w{margin-left:auto;font-size:2.8mm;color:#555;white-space:nowrap}
  .wcGrid{flex:1;display:grid;min-height:0;background:#fff}
  .wcGrid .cell{border:0.15mm solid #ddd;display:flex;box-sizing:border-box;overflow:hidden}
  .cell svg{width:100%;height:100%}
  #printArea{display:none}
  @media print{
    #app,#hint,#printOv,#gdOv,#fcOv,#helpOv{display:none!important}
    #printArea{display:block!important}
    body{background:#fff}
    @page{margin:10mm}
  }

  /* Anleitung */
  #helpOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:55;overflow:auto}
  #helpOv.show{display:block}
  #helpPanel{max-width:720px;margin:24px auto;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:20px 24px;line-height:1.55}
  #helpPanel h3{margin:0 0 4px}
  #helpPanel h4{margin:18px 0 6px;color:var(--acc)}
  #helpPanel p{margin:6px 0;color:var(--txt)}
  #helpPanel .k{background:var(--panel2);border:1px solid var(--line);border-radius:6px;
    padding:1px 7px;font-size:12px;white-space:nowrap}
  #helpPanel .dim{color:var(--dim);font-size:12px}
  #helpClose{float:right}

  /* Notizen & Tags */
  #notesBar{display:none;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line)}
  #notesBar.show{display:block}
  #notesBar textarea{width:100%;height:54px;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:8px;padding:8px;font:inherit;resize:vertical}
  #notesBar .tagRow{display:flex;gap:8px;align-items:center;margin-top:6px}
  #notesBar .tagRow label{color:var(--dim);font-size:12px}
  #notesBar .tagRow input{flex:1;background:var(--panel2);border:1px solid var(--line);
    color:var(--txt);border-radius:8px;padding:6px 8px}

  /* Sidebar-Extras */
  #tagFilter{margin:8px 8px 0;width:calc(100% - 16px)}
  .pMove{display:flex;flex-direction:column;gap:1px;margin-left:2px}
  .pMove button{padding:0 5px;font-size:8px;line-height:11px;border-radius:4px}
  .pStat{font-size:10px;color:var(--dim);margin-left:2px;white-space:nowrap}

  /* Gameday */
  #gdOv{display:none;position:fixed;inset:0;background:#0c0f12;z-index:60;overflow:auto}
  #gdOv.show{display:block}
  #gdHead{display:flex;gap:8px;align-items:center;padding:10px 14px;position:sticky;top:0;
    background:#0c0f12;border-bottom:1px solid var(--line);z-index:2}
  #gdGridWrap{padding:12px}
  #gdGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
  .gdTile{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent}
  .gdTile:hover{border-color:var(--acc)}
  .gdCap{display:flex;gap:6px;align-items:center;padding:5px 8px;background:var(--panel2)}
  .gdCap span.nm{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  #gdDetail{display:none;padding:12px;max-width:560px;margin:0 auto}
  #gdDetail svg{width:100%;background:#fff;border-radius:10px}
  #gdResults{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:10px}
  #gdResults button{padding:12px 6px;font-size:14px;font-weight:600}
  #gdResults button.on{background:var(--acc);border-color:var(--acc);color:#06121f}
  #gdEntry{display:none;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-top:10px}
  #gdEntry .pRow{margin-bottom:6px}
  #gdEffJa.on{background:#2e7d32;border-color:#2e7d32;color:#fff}
  #gdEffNein.on{background:#c62828;border-color:#c62828;color:#fff}
  #gdStats{display:none;padding:12px;max-width:820px;margin:0 auto}
  .statTbl{width:100%;border-collapse:collapse}
  .statTbl th,.statTbl td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:right;font-size:13px}
  .statTbl th:nth-child(2),.statTbl td:nth-child(2){text-align:left}
  .statTbl tr.sum td{font-weight:700;border-top:2px solid var(--line)}

  /* Startseite */
  #homeView{display:none;flex-direction:column;height:100%;overflow:auto;
    padding:clamp(14px,1.6vw,32px) clamp(16px,2vw,44px)}
  #homeView.show{display:flex}
  #homeHead{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:clamp(12px,1.2vw,24px)}
  #homeHead h2{margin:0;font-size:clamp(20px,1.5vw,32px)}
  #homeHead img{height:clamp(34px,2.6vw,54px);border-radius:6px}
  #homeSlotWrap{display:flex;gap:4px;align-items:center;margin-left:auto}
  #homeSlotWrap select{min-width:140px;font-size:clamp(13px,0.85vw,17px)}
  #homeSlotWrap button{font-size:clamp(13px,0.85vw,17px)}
  #homeActions{display:flex;gap:clamp(10px,0.9vw,18px);flex-wrap:wrap;margin-bottom:clamp(10px,0.9vw,18px)}
  .homeBtn{font-size:clamp(15px,1.15vw,26px);font-weight:600;border-radius:clamp(8px,0.6vw,14px);
    padding:clamp(13px,1.05vw,24px) clamp(18px,1.7vw,38px)}
  #homeActions2{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:clamp(14px,1.3vw,26px)}
  #homeActions2 button{font-size:clamp(13px,0.85vw,18px);padding:clamp(7px,0.6vw,13px) clamp(11px,0.95vw,20px)}
  #homeGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(170px,13vw,260px),1fr));
    gap:clamp(10px,0.9vw,18px);padding-bottom:20px}
  .homeAdd{display:flex;align-items:center;justify-content:center;font-size:clamp(44px,3.4vw,68px);color:var(--dim);
    background:var(--panel2);border:2px dashed var(--line);border-radius:10px;min-height:150px;cursor:pointer}
  .homeAdd:hover{border-color:var(--acc);color:var(--acc)}

  /* Flashcard-Trainer */
  #fcOv{display:none;position:fixed;inset:0;background:#0c0f12;z-index:60;overflow:auto}
  #fcOv.show{display:block}
  #fcHead{display:flex;gap:8px;align-items:center;padding:10px 14px;position:sticky;top:0;
    background:#0c0f12;border-bottom:1px solid var(--line);z-index:2;flex-wrap:wrap}
  #fcProg{color:var(--dim);font-size:13px;margin-left:auto}
  #fcWrap{max-width:560px;margin:20px auto;padding:0 12px 24px}
  #fcCard{background:#fff;border-radius:12px;min-height:330px;display:flex;align-items:center;
    justify-content:center;color:#111;padding:16px;cursor:pointer;overflow:hidden}
  #fcCard svg{width:100%;max-height:70vh}
  #fcCard .big{font-size:32px;font-weight:800;text-align:center;line-height:1.3}
  #fcCard .num{display:inline-block;background:#000;color:#fff;border-radius:14px;
    padding:2px 14px;font-size:20px;margin-bottom:10px}
  #fcBtns{display:flex;gap:10px;margin-top:12px}
  #fcBtns button{flex:1;font-size:17px;padding:13px;border-radius:10px;font-weight:700;border:none}
  #fcFlip{background:var(--acc);color:#06121f}
  #fcKnew{background:#2e7d32;color:#fff}
  #fcAgain{background:#b26a00;color:#fff}
  #fcRestart{background:var(--panel2);color:var(--txt);border:1px solid var(--line)!important}

  /* Flashcards-Druck (Faltkarten) */
  .fcpPage{width:190mm;min-height:262mm;background:#fff;display:grid;grid-template-columns:1fr 1fr;
    grid-auto-rows:118mm;gap:6mm;margin:0 auto 8mm;padding:5mm;box-sizing:border-box;
    page-break-after:always;align-content:start}
  .fcpCell{border:0.4mm dashed #888;display:flex;flex-direction:column;overflow:hidden;background:#fff}
  .fcpName{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2mm;
    transform:rotate(180deg);color:#111;padding:3mm;text-align:center;font-size:6.5mm;font-weight:700;min-height:0}
  .fcpNum{background:#000;color:#fff;border-radius:5mm;padding:0.5mm 4mm;font-size:5mm}
  .fcpFold{border-top:0.35mm dotted #999}
  .fcpThumb{flex:1;display:flex;min-height:0}
  .fcpThumb svg{width:100%;height:100%}

  /* A4-Playbook */
  .a4page{width:190mm;min-height:262mm;background:#fff;color:#111;display:flex;flex-direction:column;
    margin:0 auto 8mm;page-break-after:always;padding:5mm;box-sizing:border-box}
  .a4head{display:flex;align-items:center;gap:4mm;border-bottom:0.5mm solid #333;
    padding-bottom:2mm;margin-bottom:3mm}
  .a4head img{height:12mm}
  .a4head .n{font-size:7mm;font-weight:800}
  .a4head .nm{font-size:5.5mm;font-weight:600}
  .a4head .sl{margin-left:auto;font-size:3.5mm;color:#666}
  .a4page svg{width:100%;flex:1;min-height:0}
  .a4tags{font-size:3.2mm;color:#555;margin-top:1mm}
  .a4note{font-size:4mm;white-space:pre-wrap;border-top:0.3mm solid #ccc;
    padding-top:2mm;margin-top:2mm;min-height:14mm}

  @media (max-width:760px){
    #side{position:fixed;z-index:20;height:100%;left:-230px;transition:left .2s}
    #side.open{left:0}
    #burger{display:inline-block}
  }
  #burger{display:none}
</style>
</head>
<body>
<div id="homeView">
  <div id="homeHead">
    <img id="homeLogo" style="display:none">
    <h2 id="homeTitle">🏈 Playbook</h2>
    <div id="homeSlotWrap">
      <select id="slotSel" title="Speicher-Slot wählen"></select>
      <button id="slotNew" title="Neuer Slot">+</button>
      <button id="slotRen" title="Slot umbenennen">✎</button>
      <button id="slotDup" title="Slot duplizieren">⧉</button>
      <button id="slotDel" title="Slot löschen" class="warn">✕</button>
    </div>
  </div>
  <div id="homeActions">
    <button id="btnGoEdit" class="homeBtn grn">✏️ Playbook bearbeiten</button>
    <button id="btnFlash" class="homeBtn" title="Flashcards – Playbook lernen">🃏 Flashcards</button>
    <button id="btnGameday" class="homeBtn">🏟 Gameday</button>
    <button id="btnPrint" class="homeBtn" title="Drucken">🖨 Drucken</button>
  </div>
  <div id="homeActions2">
    <button id="btnShare" title="Link zum Teilen kopieren">🔗 Teilen</button>
    <button id="btnExport" title="Playbook als JSON-Datei sichern">Export</button>
    <button id="btnImport">Import</button>
    <button id="btnReset" class="warn" title="Alles auf die Standard-Plays zurücksetzen">Reset</button>
    <button id="btnLang" title="Sprache / Language">EN</button>
    <button id="btnHelp" title="Anleitung">❓ Anleitung</button>
    <input type="file" id="fileIn" accept=".json" style="display:none">
  </div>
  <div id="homeGrid"></div>
</div>
<div id="app">
  <div id="side">
    <h1>🏈 Rhinos 2026<small>5v5 Flag Football – wrist 26</small></h1>
    <select id="tagFilter"></select>
    <div id="playList"></div>
    <div id="sideFoot">
      <button id="btnNew">+ Neu</button>
      <button id="btnDup">Duplizieren</button>
      <button id="btnMirror" title="Play links/rechts spiegeln">⇋</button>
      <button id="btnDel" class="warn">Löschen</button>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <button id="btnHomeNav" title="Zur Übersicht">🏠</button>
      <button id="burger">☰</button>
      <button id="btnPrev" title="Vorheriges Play">◀</button>
      <button id="btnNext" title="Nächstes Play">▶</button>
      <input type="text" id="playName" placeholder="Play-Name">
      <button id="btnNotes" title="Notizen & Tags">📝</button>
      <div class="sep"></div>
      <button id="btnMode">✏️ Bearbeiten</button>
      <button id="btnAnim" class="grn">▶ Abspielen</button>
      <button id="btnMirrorTop" title="Play links/rechts spiegeln">⇋ Flip Play</button>
      <div class="sep"></div>
      <select id="losSel" title="Ballposition (Yardlinie)"></select>
      <div class="sep"></div>
      <span class="lbl" style="color:var(--dim)">Defense:</span>
      <select id="defSel">
        <option value="off">— aus —</option>
        <option value="c1">Cover 1 (Man)</option>
        <option value="c2">Cover 2</option>
        <option value="c3">Cover 3 (Diamond)</option>
      </select>
      <button id="btnZones" title="Zonen anzeigen">Zonen</button>
      <button id="btnPinDef" title="Defense für dieses Play merken">📌</button>
      <div class="spacer"></div>
      <button id="btnPrintEd" title="Drucken">🖨</button>
    </div>

    <div id="editBar">
      <button id="btnUndo" title="Rückgängig (Strg+Z)">↶</button>
      <button id="btnRedo" title="Wiederholen (Strg+Y)">↷</button>
      <button id="btnSnap" title="Einrasten (halbe Yards)">🧲</button>
      <div class="sep"></div>
      <span class="lbl" id="selLbl">Auswahl:</span><span id="selInfo">–</span>
      <div class="sep"></div>
      <button id="btnAddPt" title="Fügt nach dem ausgewählten Punkt einen Zwischenpunkt ein; ohne Auswahl wird die Route am Ende verlängert">+ Punkt</button>
      <button id="btnDelPt" title="Entfernt den ausgewählten Punkt">– Punkt</button>
      <button id="btnAddLine" title="Neue Linie ab dem ausgewählten Punkt – so entstehen Abzweigungen/Options-Routen">+ Abzweig</button>
      <button id="btnDelLine" class="warn" title="Löscht die Linie des ausgewählten Punkts">Linie löschen</button>
      <div class="sep"></div>
      <label class="lbl" id="lblLbl">Name:</label>
      <input type="text" id="lblIn" maxlength="3" style="width:52px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 8px" disabled>
      <div class="sep"></div>
      <select id="styleSel" title="Linienstil der ausgewählten Linie">
        <option value="solid">durchgezogen</option>
        <option value="dash">gestrichelt</option>
        <option value="dot">gepunktet</option>
        <option value="wave">gewellt (Motion)</option>
      </select>
      <select id="endSel">
        <option value="a">Ende: Pfeil</option>
        <option value="o">Ende: Punkt</option>
        <option value="n">Ende: offen</option>
      </select>
      <button id="btnAddText" title="Text auf dem Play platzieren">+ Text</button>
      <div class="sep"></div>
      <button id="btnRound" title="Routen-Ecken abrunden (global)">◝ Rund</button>
      <select id="lwSel" title="Liniendicke aller Routen (global)">
        <option value="3">Linien: dünn</option>
        <option value="4">Linien: normal</option>
        <option value="5.5">Linien: dick</option>
        <option value="7">Linien: sehr dick</option>
      </select>
      <div class="spacer"></div>
      <span class="lbl" id="editTip">Tipp: Punkt auf der Route antippen, dann „+ Abzweig" für eine Options-Route ab diesem Punkt.</span>
    </div>

    <div id="notesBar">
      <textarea id="noteTa" placeholder="Notizen zum Play (Coaching Points, QB-Reads …)"></textarea>
      <div class="tagRow">
        <label id="tagsLblEl">Tags:</label>
        <input type="text" id="tagsIn" placeholder="z.B. Redzone, 3rd Down (Komma-getrennt)">
      </div>
      <div class="tagRow">
        <label id="catLblEl">Kategorie:</label>
        <select id="catSel" style="flex:1;min-width:0"></select>
        <button id="catAdd" title="Neue Kategorie">+</button>
        <button id="catRen" title="Kategorie umbenennen">✎</button>
        <button id="catDel" class="warn" title="Kategorie löschen">🗑</button>
      </div>
    </div>

    <div id="fieldWrap"></div>
  </div>
</div>
<div id="printOv">
  <div id="printPanel">
    <h3 id="prTitle">🖨 QB-Wristband drucken</h3>
    <div class="pRow">
      <label id="prLayLbl">Layout:</label>
      <select id="prLay">
        <option value="wrist">Wristband (3 Fenster)</option>
        <option value="a4">A4-Playbook (1 Play/Seite)</option>
        <option value="flash">Flashcards (falten & ausschneiden)</option>
      </select>
      <label id="prForLbl">Für:</label>

const LS_KEY = 'rhinosPlaybook_v1';
function freshSlot(name){
  return {name, plays: JSON.parse(JSON.stringify(DEFAULT_PLAYS)),
    def:{preset:'off', players:[], zones:true, v:DEF_V}, cur:0,
    labels:{X:'X',Y:'Y',C:'C',Z:'Z',Q:'Q'}, cats:[]};
}
function LBL(pid){ return (SLOT().labels && SLOT().labels[pid]) || pid; }
let state = {
  slots: [freshSlot('Playbook 1')], slot: 0,
  mode: 'view', selP: null, selH: null, selD: null,   // selH = {li, pi}, selD = Defense-Index
  logo: null, teamName: 'Rhinos', lang: 'de',
  snap: true, tagFilter: '', showNotes: false, lineW: 4, round: false,
  print: {preset:'gross', w:127, h:76, grid:'4x2', logo:true, layout:'wrist', pos:'all', def:false, cat:false, texts:true}
};
const CAT_COLORS = ['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00897b','#f4b400','#6d4c41'];
function catColOf(play){
  const c = (SLOT().cats||[]).find(c=>c.id===play.cat);
  return c ? c.c : null;
}
function SLOT(){ return state.slots[state.slot]; }
function DEF(){ const p = SLOT().plays[SLOT().cur]; return p.defOverride || SLOT().def; }
try{
  const saved = localStorage.getItem(LS_KEY);
  if(saved){ const s = JSON.parse(saved);
    if(s.slots && s.slots.length){
      state.slots = s.slots; state.slot = Math.min(s.slot||0, s.slots.length-1);
      state.logo = s.logo || null; state.teamName = s.teamName || 'Rhinos';
      state.lang = s.lang || 'de';
      state.snap = s.snap !== false;
      state.lineW = s.lineW || 4;
      state.round = !!s.round;
      if(s.print) state.print = Object.assign(state.print, s.print);
    } else if(s.plays && s.plays.length){   // altes Ein-Playbook-Format migrieren
      state.slots = [{name:'Playbook 1', plays:s.plays,
        def: s.def || {preset:'off',players:[],zones:true}, cur: Math.min(s.cur||0, s.plays.length-1)}];
    }
    for(const sl of state.slots){
      if(!sl.def) sl.def = {preset:'off', players:[], zones:true};
      if(sl.def.preset!=='off' && !DEF_PRESETS[sl.def.preset]){ sl.def.preset='off'; sl.def.players=[]; }
      if(sl.def.preset!=='off' && sl.def.v!==DEF_V)
        sl.def.players = JSON.parse(JSON.stringify(DEF_PRESETS[sl.def.preset]));
      sl.def.v = DEF_V;
      if(sl.cur==null || sl.cur>=sl.plays.length) sl.cur = 0;
      if(!sl.labels) sl.labels = {X:'X',Y:'Y',C:'C',Z:'Z',Q:'Q'};
      if(!sl.cats) sl.cats = [];
      if(!sl.games) sl.games = [];
    }
  }
}catch(e){}
let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ try{
    localStorage.setItem(LS_KEY, JSON.stringify({slots:state.slots, slot:state.slot,
      logo:state.logo, teamName:state.teamName, print:state.print, lang:state.lang,
      snap:state.snap, lineW:state.lineW, round:state.round}));
  }catch(e){} }, 300);
}

/* ================= Undo / Redo & Einrasten ================= */
let undoStack = [], redoStack = [];
function snapshot(){ return JSON.stringify({plays:SLOT().plays, def:SLOT().def, cur:SLOT().cur, labels:SLOT().labels, cats:SLOT().cats}); }
function pushUndo(){
  const sn = snapshot();
  if(undoStack[undoStack.length-1]===sn) return;
  undoStack.push(sn); if(undoStack.length>60) undoStack.shift();
  redoStack.length = 0;
}
function clearUndo(){ undoStack.length=0; redoStack.length=0; }
function applySnapshot(sn){
  const d = JSON.parse(sn);
  SLOT().plays = d.plays; SLOT().def = d.def; SLOT().cur = Math.min(d.cur, d.plays.length-1);
  if(d.labels) SLOT().labels = d.labels;
  if(d.cats) SLOT().cats = d.cats;
  state.selP=null; state.selH=null; state.selD=null; render(); save();
}
function doUndo(){ if(!undoStack.length) return; redoStack.push(snapshot()); applySnapshot(undoStack.pop()); }
function doRedo(){ if(!redoStack.length) return; undoStack.push(snapshot()); applySnapshot(redoStack.pop()); }
document.addEventListener('keydown', ev=>{
  if(!(ev.ctrlKey||ev.metaKey) || ev.altKey) return;
  const k = ev.key.toLowerCase();
  if(k==='z' && !ev.shiftKey){ ev.preventDefault(); doUndo(); }
  else if(k==='y' || (k==='z' && ev.shiftKey)){ ev.preventDefault(); doRedo(); }
});
function snapPt(p){
  return state.snap ? [Math.round(p[0]), Math.round(p[1]*2)/2] : p;
}

function esc(s){return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}

/* Globale Liniendicke */
function GLW(){ return state.lineW || 4; }
function LWF(){ return GLW()/4; }
/* Linienstile: solid | dash | dot | wave (ln.d bleibt aus Kompatibilität erhalten) */
function styleOf(ln){ return ln.s || (ln.d ? 'dash' : 'solid'); }
function dashFor(st, sc){
  if(st==='dash') return (3*sc).toFixed(1)+' '+(9*sc).toFixed(1);
  if(st==='dot')  return '0.1 '+(8*sc).toFixed(1);
  return null;
}
function roundedD(pts, r){
  if(pts.length<3) return pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  let d = 'M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
  for(let i=1; i<pts.length-1; i++){
    const a=pts[i-1], b=pts[i], c=pts[i+1];
    const l1=Math.hypot(b[0]-a[0],b[1]-a[1])||1, l2=Math.hypot(c[0]-b[0],c[1]-b[1])||1;
    const r1=Math.min(r,l1/2), r2=Math.min(r,l2/2);
    d += ' L'+(b[0]-(b[0]-a[0])/l1*r1).toFixed(1)+' '+(b[1]-(b[1]-a[1])/l1*r1).toFixed(1)
       + ' Q'+b[0].toFixed(1)+' '+b[1].toFixed(1)
       + ' '+(b[0]+(c[0]-b[0])/l2*r2).toFixed(1)+' '+(b[1]+(c[1]-b[1])/l2*r2).toFixed(1);
  }
  return d + ' L'+pts[pts.length-1][0].toFixed(1)+' '+pts[pts.length-1][1].toFixed(1);
}
function lineD(pts, st, amp, rr){
  if(st==='wave') return wavyD(pts, amp);
  if(state.round) return roundedD(pts, rr);
  return pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
}
function wavyD(pts, amp){
  let d = 'M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
  for(let i=1; i<pts.length; i++){
    const a=pts[i-1], b=pts[i];
    const L = Math.hypot(b[0]-a[0], b[1]-a[1]) || 1;
    const n = Math.max(2, Math.round(L/(amp*3)));
    const px = -(b[1]-a[1])/L, py = (b[0]-a[0])/L;
    for(let k=1; k<=n; k++){
      const t0=(k-0.5)/n, t1=k/n, sgn = k%2 ? 1 : -1;
      d += ' Q'+(a[0]+(b[0]-a[0])*t0+px*amp*sgn).toFixed(1)+' '+(a[1]+(b[1]-a[1])*t0+py*amp*sgn).toFixed(1)
         + ' '+(a[0]+(b[0]-a[0])*t1).toFixed(1)+' '+(a[1]+(b[1]-a[1])*t1).toFixed(1);
    }
  }
  return d;
}
function arrowHead(a,b,color,s=11){
  const dx=b[0]-a[0], dy=b[1]-a[1], L=Math.hypot(dx,dy)||1;
  const ux=dx/L, uy=dy/L;
  const p1=[b[0]-ux*s-uy*s*0.55, b[1]-uy*s+ux*s*0.55];
  const p2=[b[0]-ux*s+uy*s*0.55, b[1]-uy*s-ux*s*0.55];
  return `<polygon points="${b[0]},${b[1]} ${p1[0]},${p1[1]} ${p2[0]},${p2[1]}" fill="${color}"/>`;
}

function render(){
  const play = SLOT().plays[SLOT().cur];
  let s = `<svg id="field" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Feld
  s += `<rect width="${W}" height="${H}" fill="#f4f6f3"/>`;
  s += `<rect width="${W}" height="${H}" fill="none" stroke="#c9d2c9" stroke-width="2"/>`;
  // Ballposition: Feld 2×25yd + 10yd Endzonen, LOS = play.los Yards von der eigenen Goalline
  const los = play.los || 5, gOwn = -los, gOpp = 50 - los;
  // Endzonen (eigene unten, gegnerische oben)
  s += `<rect x="0" y="${FY(gOwn)}" width="${W}" height="240" fill="#e2eae2"/>`;
  s += `<rect x="0" y="${FY(gOpp+10)}" width="${W}" height="240" fill="#e2eae2"/>`;
  s += `<text x="${W/2}" y="${FY(gOwn-4)}" font-size="24" letter-spacing="10" fill="#b4c2b4" text-anchor="middle">ENDZONE</text>`;
  s += `<text x="${W/2}" y="${FY(gOpp+5)}" font-size="24" letter-spacing="10" fill="#b4c2b4" text-anchor="middle">ENDZONE</text>`;
  // Vertikale Viertel-Linien (25 / 50 / 75 % der Feldbreite)
  for(const qx of [25,50,75])
    s += `<line x1="${FX(qx)}" y1="8" x2="${FX(qx)}" y2="${H-8}" stroke="#e2e8e2" stroke-width="1.2"/>`;
  for(let y=-10; y<=20; y+=1){
    if(y===0) continue;
    const abs = los + y;
    if(abs<=0 || abs>=50) continue;                    // keine Yardlinien in den Endzonen
    const five = abs%5===0;
    s += `<line x1="8" y1="${FY(y)}" x2="${W-8}" y2="${FY(y)}" stroke="${five?'#bfcabf':'#e0e6e0'}" stroke-width="${five?3:1.6}"/>`;
    if(five) s += `<text x="${W-12}" y="${FY(y)-4}" font-size="10" fill="#aab6aa" text-anchor="end">${abs<=25?abs:50-abs}</text>`;
  }
  // Goallinien
  s += `<line x1="0" y1="${FY(gOwn)}" x2="${W}" y2="${FY(gOwn)}" stroke="#7f8f7f" stroke-width="5"/>`;
  s += `<line x1="0" y1="${FY(gOpp)}" x2="${W}" y2="${FY(gOpp)}" stroke="#7f8f7f" stroke-width="5"/>`;
  // LOS
  s += `<line x1="0" y1="${FY(0)}" x2="${W}" y2="${FY(0)}" stroke="#8a958a" stroke-width="4"/>`;
  s += `<text x="10" y="${FY(0)-8}" font-size="11" fill="#8a958a" font-weight="bold">LOS</text>`;

  // ---- Defense (Zonen unten, Spieler oben); pro Play überschreibbar ----
  const D = DEF();
  if(D.preset!=='off'){
    if(D.zones) for(const d of D.players){
      if(d.z) s += `<ellipse cx="${FX(d.x)}" cy="${FY(d.y)}" rx="${d.z[0]*5.7}" ry="${d.z[1]*24}"
        fill="rgba(198,40,40,.10)" stroke="rgba(198,40,40,.45)" stroke-width="1.5" stroke-dasharray="6 5"/>`;
    }
    s += `<text x="12" y="18" font-size="11" fill="#c62828">${T('def_'+D.preset)}</text>`;
  }

  // ---- Offense-Routen ----
  play.lines.forEach((ln,li)=>{
    const col = '#222';
    const pts = ln.pts.map(p=>[FX(p[0]),FY(p[1])]);
    const st = styleOf(ln);
    const dAttr = lineD(pts, st, 5, 14);
    const da = dashFor(st, LWF());
    const sel = (state.mode==='edit' && state.selP===ln.p);
    s += `<path d="${dAttr}" fill="none" stroke="${sel?'#1668c9':col}" stroke-width="${GLW()}"
      stroke-linejoin="round" stroke-linecap="round" ${da?`stroke-dasharray="${da}"`:''}/>`;
    if(pts.length>1){
      const a=pts[pts.length-2], b=pts[pts.length-1];
      if(ln.e==='a') s += arrowHead(a,b, sel?'#1668c9':col, 11*Math.sqrt(LWF()));
      else if(ln.e==='o') s += `<circle cx="${b[0]}" cy="${b[1]}" r="${6*Math.sqrt(LWF())}" fill="${sel?'#1668c9':col}"/>`;
    }
  });

  // ---- Offense-Spieler ----
  for(const pid of ['X','Y','C','Z','Q']){
    const [x,y] = play.pos[pid];
    const cx=FX(x), cy=FY(y), col=COLORS[pid];
    const sel = (state.mode==='edit' && state.selP===pid);
    const ring = sel ? `stroke="#1668c9" stroke-width="4"` : `stroke="#fff" stroke-width="2.5"`;
    const lb = LBL(pid), lfs = lb.length>1 ? 9.5 : 14, ldy = lb.length>1 ? 3.5 : 5;
    if(pid==='C')
      s += `<rect data-op="${pid}" x="${cx-13}" y="${cy-13}" width="26" height="26" rx="5" fill="${col}" ${ring} style="cursor:grab"/>`;
    else
      s += `<circle data-op="${pid}" cx="${cx}" cy="${cy}" r="14" fill="${col}" ${ring} style="cursor:grab"/>`;
    s += `<text x="${cx}" y="${cy+ldy}" font-size="${lfs}" font-weight="bold" fill="#fff" text-anchor="middle" pointer-events="none">${esc(lb)}</text>`;
  }

  // ---- Play-Texte ----
  (play.texts||[]).forEach((tx,txi)=>{
    s += `<text data-tx="${txi}" x="${FX(tx.x)}" y="${FY(tx.y)}" font-size="15" font-weight="600" fill="#333"
      text-anchor="middle" stroke="#fff" stroke-width="3" style="paint-order:stroke;cursor:${state.mode==='edit'?'grab':'default'}">${esc(tx.t)}</text>`;
  });

  // ---- Editor-Handles ----
  if(state.mode==='edit' && state.selP){
    play.lines.forEach((ln,li)=>{
      if(ln.p!==state.selP) return;
      ln.pts.forEach((p,pi)=>{
        const hSel = state.selH && state.selH.li===li && state.selH.pi===pi;
        s += `<circle data-h="${li}:${pi}" cx="${FX(p[0])}" cy="${FY(p[1])}" r="9"
          fill="${hSel?'#ffb300':'#fff'}" stroke="#1668c9" stroke-width="3" style="cursor:grab"/>`;
      });
    });
  }

  // ---- Defense-Spieler (Rauten) ----
  if(D.preset!=='off'){
    D.players.forEach((d,di)=>{
      const cx=FX(d.x), cy=FY(d.y);
      const fs = d.l.length>1 ? 10 : 13, dy = d.l.length>1 ? 3.5 : 5;
      const dSel = state.mode==='edit' && state.selD===di;
      s += `<g data-dp="${di}" style="cursor:grab">
        <rect x="${cx-13}" y="${cy-13}" width="26" height="26" rx="4" fill="#c62828" stroke="${dSel?'#1668c9':'#fff'}" stroke-width="${dSel?4:2.5}" transform="rotate(45 ${cx} ${cy})"/>
        <text x="${cx}" y="${cy+dy}" font-size="${fs}" font-weight="bold" fill="#fff" text-anchor="middle" pointer-events="none">${esc(d.l)}</text></g>`;
    });
  }

  s += `<g id="animLayer"></g></svg>`;
  wrap.innerHTML = s;
  bindField();
  renderSidebar();
  renderTopbar();
  renderEditBar();
  if(state.view==='home') renderHome();
}

function renderSlots(){
  const sel = document.getElementById('slotSel');
  sel.innerHTML = state.slots.map((s,i)=>
    `<option value="${i}" ${i===state.slot?'selected':''}>${esc(s.name)}</option>`).join('');
}
function playMatchesFilter(p){
  if(!state.tagFilter) return true;
  if(state.tagFilter.startsWith('cat:')) return p.cat === +state.tagFilter.slice(4);
  return (p.tags||'').split(',').map(t=>t.trim()).includes(state.tagFilter);
}
function renderSidebar(){
  renderSlots();
  const plays = SLOT().plays;
  // Tag-Filter füllen
  const tf = document.getElementById('tagFilter');
  const tags = new Set();
  plays.forEach(p=>(p.tags||'').split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>tags.add(t)));
  const cats = SLOT().cats||[];
  if(state.tagFilter && !state.tagFilter.startsWith('cat:') && !tags.has(state.tagFilter)) state.tagFilter='';
  if(state.tagFilter.startsWith('cat:') && !cats.some(c=>c.id===+state.tagFilter.slice(4))) state.tagFilter='';
  tf.innerHTML = `<option value="">${T('allTags')}</option>` +
    cats.map(c=>`<option value="cat:${c.id}" ${state.tagFilter==='cat:'+c.id?'selected':''}>● ${esc(c.n)}</option>`).join('') +
    [...tags].sort().map(t=>`<option value="${esc(t)}" ${t===state.tagFilter?'selected':''}>🏷 ${esc(t)}</option>`).join('');
  tf.style.display = (tags.size || cats.length) ? '' : 'none';

  const list = document.getElementById('playList');
  list.innerHTML = plays.map((p,i)=>{
    if(!playMatchesFilter(p)) return '';
    const sp = statFor(p,'all');
    const st = sp.n ? `<span class="pStat">${sp.eff}/${sp.n}</span>` : '';
    const mv = (i===SLOT().cur && !state.tagFilter)
      ? `<span class="pMove"><button data-mv="-1" title="${T('tUp')}">▲</button><button data-mv="1" title="${T('tDown')}">▼</button></span>` : '';
    const cc = catColOf(p);
    return `<div class="pItem ${i===SLOT().cur?'on':''}" data-i="${i}" draggable="true">
       <span class="pNum"${cc?` style="background:${cc}"`:''}>${i+1}</span><span class="pName">${esc(p.name||'Play '+(i+1))}</span>${st}${mv}</div>`;
  }).join('');
  list.querySelectorAll('.pItem').forEach(el=>{
    el.onclick = ev=>{
      if(ev.target.dataset && ev.target.dataset.mv){ movePlay(+el.dataset.i, +ev.target.dataset.mv); return; }
      SLOT().cur = +el.dataset.i; state.selP=null; state.selH=null; state.selD=null; render(); save();
      document.getElementById('side').classList.remove('open');
    };
    el.ondragstart = ev=>ev.dataTransfer.setData('text/plain', el.dataset.i);
    el.ondragover = ev=>ev.preventDefault();
    el.ondrop = ev=>{
      ev.preventDefault();
      const from = +ev.dataTransfer.getData('text/plain'), to = +el.dataset.i;
      if(isNaN(from) || from===to) return;
      pushUndo();
      const arr = SLOT().plays, [it] = arr.splice(from,1);
      arr.splice(to,0,it); SLOT().cur = to; render(); save();
    };
  });
}
function movePlay(i,dir){
  const arr = SLOT().plays, j = i+dir;
  if(j<0 || j>=arr.length) return;
  pushUndo();
  const [it] = arr.splice(i,1); arr.splice(j,0,it); SLOT().cur = j; render(); save();
}

function playerLines(pid){ return SLOT().plays[SLOT().cur].lines.filter(l=>l.p===pid); }
function activeLine(){
  const play = SLOT().plays[SLOT().cur];
  if(state.selH) return play.lines[state.selH.li];
  const ls = play.lines.map((l,i)=>({l,i})).filter(o=>o.l.p===state.selP);

function lineIndexOfSel(){
  if(!state.selH) return 0;
  const play = SLOT().plays[SLOT().cur];
  let n=0;
  for(let i=0;i<=state.selH.li;i++) if(play.lines[i].p===state.selP) n++;

}

/* ================= Pointer-Interaktion ================= */
let drag = null;
function svgPoint(ev){
  const svg = document.getElementById('field');
  const pt = svg.createSVGPoint(); pt.x=ev.clientX; pt.y=ev.clientY;
  const p = pt.matrixTransform(svg.getScreenCTM().inverse());
  return [Math.max(0,Math.min(100,IX(p.x))), Math.max(-10.5,Math.min(20,IY(p.y)))];
}
function bindField(){
  const svg = document.getElementById('field');
  svg.onpointerdown = ev=>{
    const t = ev.target;
    const play = SLOT().plays[SLOT().cur];
    if(t.dataset.h && state.mode==='edit'){                       // Routen-Handle
      const [li,pi] = t.dataset.h.split(':').map(Number);
      state.selH = {li,pi};
      drag = {type:'h', li, pi};
    } else if(t.dataset.op){                                       // Offense-Spieler
      const pid = t.dataset.op;
      if(state.mode==='edit'){
        if(state.selP!==pid){ state.selP=pid; state.selH=null; state.selD=null; }
        drag = {type:'o', pid, start:svgPoint(ev), pos0:play.pos[pid].slice(),
                lines0: play.lines.map(l=> l.p===pid ? l.pts.map(p=>p.slice()) : null)};
      }
    } else if(t.dataset.tx!=null && state.mode==='edit'){          // Play-Text
      drag = {type:'t', ti:+t.dataset.tx, moved:false};
    } else if(t.closest && t.closest('[data-dp]')){                // Defense
      const di = +t.closest('[data-dp]').dataset.dp;
      if(state.mode==='edit'){ state.selD=di; state.selP=null; state.selH=null; }
      drag = {type:'d', di};
    } else {
      if(state.mode==='edit'){ state.selP=null; state.selH=null; state.selD=null; }
      drag = null;
    }
    if(drag){ pushUndo(); svg.setPointerCapture(ev.pointerId); ev.preventDefault(); }
    render();
  };
  svg.onpointermove = ev=>{
    if(!drag) return;
    const p = svgPoint(ev);
    const play = SLOT().plays[SLOT().cur];
    if(drag.type==='h'){
      play.lines[drag.li].pts[drag.pi] = snapPt(p);
    } else if(drag.type==='o'){
      const np = snapPt([drag.pos0[0]+p[0]-drag.start[0], drag.pos0[1]+p[1]-drag.start[1]]);
      const dx=np[0]-drag.pos0[0], dy=np[1]-drag.pos0[1];
      play.pos[drag.pid] = np;
      play.lines.forEach((l,i)=>{
        if(drag.lines0[i]) l.pts = drag.lines0[i].map(q=>[q[0]+dx, q[1]+dy]);
      });
    } else if(drag.type==='d'){
      const sp = snapPt(p);
      DEF().players[drag.di].x = sp[0];
      DEF().players[drag.di].y = Math.max(0.5, sp[1]);
    } else if(drag.type==='t'){
      drag.moved = true;
      const sp = snapPt(p);
      const tx = play.texts[drag.ti];
      if(tx){ tx.x = sp[0]; tx.y = sp[1]; }
    }
    requestRender();
  };
  svg.onpointerup = svg.onpointercancel = ()=>{
    if(!drag) return;
    if(drag.type==='t' && !drag.moved){
      const play = SLOT().plays[SLOT().cur];
      const tx = play.texts && play.texts[drag.ti];
      if(tx){
        const nv = prompt(T('textEditPrompt'), tx.t);
        if(nv!==null){
          if(nv.trim()==='') play.texts.splice(drag.ti,1);
          else tx.t = nv;
          render();
        }
      }
    }
    drag = null; save();
  };
}

/* ================= Animation ================= */
let animId = null;
document.getElementById('btnAnim').onclick = ()=>{
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  const play = SLOT().plays[SLOT().cur];
  // Phase 1: Motion (gewellte Linie), Phase 2: Route (durchgezogene Linie).
  // Alle laufen mit derselben Geschwindigkeit; kürzere Wege sind früher fertig.
  function pathData(ln){
    if(!ln) return null;
    const pts = ln.pts.map(p=>[FX(p[0]),FY(p[1])]);
    let len=0; const segs=[];
    for(let i=1;i<pts.length;i++){ const L=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]); segs.push(L); len+=L; }
    return len>1 ? {pts, segs, len} : null;
  }
  function pointAt(pd, dist){
    let i=0, d=dist;
    while(i<pd.segs.length-1 && d>pd.segs[i]){ d-=pd.segs[i]; i++; }
    const a=pd.pts[i], b=pd.pts[i+1], f=pd.segs[i]?Math.min(1,d/pd.segs[i]):1;
    return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f];
  }
  const runners = [];
  for(const pid of ['X','Y','C','Z','Q']){
    const m = pathData(play.lines.find(l=>l.p===pid && styleOf(l)==='wave'));
    const r = pathData(play.lines.find(l=>l.p===pid && styleOf(l)==='solid'));
    if(!m && !r) continue;
    runners.push({pid, m, r, start:[FX(play.pos[pid][0]), FY(play.pos[pid][1])]});
  }
  const layer = document.getElementById('animLayer');
  if(!runners.length) return;
  layer.innerHTML = runners.map(r=>`<circle id="an_${r.pid}" r="10" fill="${COLORS[r.pid]}" stroke="#fff" stroke-width="2.5" opacity="0.95"/>`).join('');
  const maxM = Math.max(0, ...runners.map(r=>r.m?r.m.len:0));
  const maxR = Math.max(0, ...runners.map(r=>r.r?r.r.len:0));
  const DUR = Math.max(1500, (maxM+maxR)*4.5);
  const v = (maxM+maxR)/DUR;                       // px pro ms – für alle gleich
  const T1 = v>0 ? maxM/v : 0;                     // Ende der Motion-Phase
  const PAUSE = maxM>0 ? 350 : 0;                  // kurze "Set"-Pause vor dem Snap
  const t0 = performance.now();
  function step(t){
    const el = t - t0;
    for(const r of runners){
      let pt;
      if(el < T1){                                  // Motion-Phase
        pt = r.m ? pointAt(r.m, Math.min(r.m.len, el*v)) : (r.r ? r.r.pts[0] : r.start);
      } else if(el < T1 + PAUSE){                   // kurz stehen (Set)
        pt = r.m ? r.m.pts[r.m.pts.length-1] : (r.r ? r.r.pts[0] : r.start);
      } else {                                      // Routen-Phase
        pt = r.r ? pointAt(r.r, Math.min(r.r.len, (el-T1-PAUSE)*v))
                 : (r.m ? r.m.pts[r.m.pts.length-1] : r.start);
      }
      const c = document.getElementById('an_'+r.pid);
      if(c){ c.setAttribute('cx', pt[0]); c.setAttribute('cy', pt[1]); }
    }
    if(el < DUR + PAUSE) animId = requestAnimationFrame(step);
    else { setTimeout(()=>{ const l=document.getElementById('animLayer'); if(l) l.innerHTML=''; },600); animId=null; }
  }
  animId = requestAnimationFrame(step);
};

/* ================= Wristband-Druck ================= */
function playThumbSVG(play, num, hl, catCol, withTexts){
  const TX = x => 4 + x*2.32, TY = y => 112 - y*5.4;   // viewBox 240 x 164
  let s = `<svg viewBox="0 0 240 164" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;
  s += `<line x1="0" y1="${TY(0)}" x2="240" y2="${TY(0)}" stroke="#aaa" stroke-width="2"/>`;
  for(const ln of play.lines){
    const col = hl ? (ln.p===hl ? COLORS[hl] : '#c3c9ce') : '#111';
    const wd = (hl && ln.p===hl ? 3.4 : 2.6) * LWF();
    const pts = ln.pts.map(p=>[TX(p[0]),TY(p[1])]);
    const st = styleOf(ln);
    const dAttr = lineD(pts, st, 3, 8);
    const da = dashFor(st, 0.6*LWF());
    s += `<path d="${dAttr}"
      fill="none" stroke="${col}" stroke-width="${wd}" stroke-linejoin="round" stroke-linecap="round"
      ${da?`stroke-dasharray="${da}"`:''}/>`;
    if(pts.length>1){
      const a=pts[pts.length-2], b=pts[pts.length-1];
      if(ln.e==='a') s += arrowHead(a,b,col,6.5*Math.sqrt(LWF()));
      else if(ln.e==='o') s += `<circle cx="${b[0]}" cy="${b[1]}" r="${3.5*Math.sqrt(LWF())}" fill="${col}"/>`;
    }
  }
  for(const pid of ['X','Y','C','Z','Q']){
    const [x,y]=play.pos[pid], cx=TX(x), cy=TY(y);
    const fill = (hl && pid!==hl) ? '#c3c9ce' : COLORS[pid];
    if(pid==='C') s += `<rect x="${cx-7}" y="${cy-7}" width="14" height="14" rx="3" fill="${fill}"/>`;
    else s += `<circle cx="${cx}" cy="${cy}" r="8" fill="${fill}"/>`;
    const lb = LBL(pid);
    s += `<text x="${cx}" y="${cy+3}" font-size="${lb.length>1?6:8.5}" font-weight="bold" fill="#fff" text-anchor="middle">${esc(lb)}</text>`;
  }
  if(withTexts) for(const tx of (play.texts||[]))
    s += `<text x="${TX(tx.x)}" y="${TY(tx.y)}" font-size="9" font-weight="600" fill="#333"
      text-anchor="middle" stroke="#fff" stroke-width="2" style="paint-order:stroke">${esc(tx.t)}</text>`;
  s += `<rect x="3" y="3" width="22" height="14" rx="7" fill="${catCol||'#000'}"/>
    <text x="14" y="14" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">${num}</text>`;
  const nm = (play.name||'').replace(/^\d+\s*/,'');
  if(nm) s += `<text x="29" y="14" font-size="8" fill="#333">${esc(nm).slice(0,30)}</text>`;
  return s + `</svg>`;
}
function gridDims(){ const [c,r] = state.print.grid.split('x').map(Number); return [c,r]; }
function buildCards(){
  const [cols,rows] = gridDims(), per = cols*rows;
  const hl = state.print.pos==='all' ? null : state.print.pos;
  const plays = SLOT().plays;
  const cards = Math.max(1, Math.ceil(plays.length/per));
  let html = '';
  for(let w=0; w<cards; w++){
    const chunk = plays.slice(w*per, (w+1)*per);
    if(!chunk.length) break;
    let cells = chunk.map((p,i)=>`<div class="cell">${playThumbSVG(p, w*per+i+1, hl,
      state.print.cat?catColOf(p):null, state.print.texts)}</div>`).join('');
    for(let i=chunk.length; i<per; i++) cells += '<div class="cell"></div>';
    const logo = (state.print.logo && state.logo) ? `<img src="${state.logo}">` : '';
    html += `<div class="wcard" style="width:${state.print.w}mm;height:${state.print.h}mm">
      <div class="wcHead">${logo}<span class="t">${esc(state.teamName)}${hl?' · '+esc(LBL(hl)):''}</span>
        <span class="w">${esc(SLOT().name)} · ${T('window')} ${w+1}</span></div>
      <div class="wcGrid" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr)">${cells}</div>
    </div>`;
  }
  return html;
}
/* Großes statisches Play-Diagramm (A4-Druck & Gameday) */
function bigPlaySVG(play, withDef, hl, withTexts){
  let s = `<svg viewBox="0 30 600 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;
  s += `<rect y="30" width="600" height="700" fill="#fff"/>`;
  const los = play.los || 5, gOwn = -los, gOpp = 50 - los;
  s += `<rect x="0" y="${FY(gOwn)}" width="${W}" height="240" fill="#f0f2f0"/>`;
  s += `<rect x="0" y="${FY(gOpp+10)}" width="${W}" height="240" fill="#f0f2f0"/>`;
  s += `<text x="${W/2}" y="${FY(gOwn-4)}" font-size="24" letter-spacing="10" fill="#ccd4cc" text-anchor="middle">ENDZONE</text>`;
  s += `<text x="${W/2}" y="${FY(gOpp+5)}" font-size="24" letter-spacing="10" fill="#ccd4cc" text-anchor="middle">ENDZONE</text>`;
  for(const qx of [25,50,75])
    s += `<line x1="${FX(qx)}" y1="38" x2="${FX(qx)}" y2="722" stroke="#f0f0f0" stroke-width="1.2"/>`;
  for(let y=-9; y<=19; y+=1){
    if(y===0) continue;
    const abs = los + y;
    if(abs<=0 || abs>=50) continue;
    const five = abs%5===0;
    s += `<line x1="8" y1="${FY(y)}" x2="${W-8}" y2="${FY(y)}" stroke="${five?'#c4c4c4':'#e8e8e8'}" stroke-width="${five?2.5:1.5}"/>`;
    if(five) s += `<text x="${W-12}" y="${FY(y)-4}" font-size="10" fill="#999" text-anchor="end">${abs<=25?abs:50-abs}</text>`;
  }
  s += `<line x1="0" y1="${FY(gOwn)}" x2="${W}" y2="${FY(gOwn)}" stroke="#9aa59a" stroke-width="5"/>`;
  s += `<line x1="0" y1="${FY(gOpp)}" x2="${W}" y2="${FY(gOpp)}" stroke="#9aa59a" stroke-width="5"/>`;
  s += `<line x1="0" y1="${FY(0)}" x2="${W}" y2="${FY(0)}" stroke="#666" stroke-width="4"/>`;
  if(withDef){
    const D = play.defOverride || SLOT().def;
    if(D.preset!=='off'){
      for(const d of D.players){
        if(d.z && D.zones!==false) s += `<ellipse cx="${FX(d.x)}" cy="${FY(d.y)}" rx="${d.z[0]*5.7}" ry="${d.z[1]*24}"
          fill="rgba(198,40,40,.08)" stroke="rgba(198,40,40,.4)" stroke-width="1.5" stroke-dasharray="6 5"/>`;
      }
      for(const d of D.players){
        const cx=FX(d.x), cy=FY(d.y), fs=d.l.length>1?10:13, dy=d.l.length>1?3.5:5;
        s += `<rect x="${cx-13}" y="${cy-13}" width="26" height="26" rx="4" fill="#c62828" stroke="#fff" stroke-width="2.5" transform="rotate(45 ${cx} ${cy})"/>
          <text x="${cx}" y="${cy+dy}" font-size="${fs}" font-weight="bold" fill="#fff" text-anchor="middle">${d.l}</text>`;
      }
    }
  }
  for(const ln of play.lines){
    const col = hl ? (ln.p===hl ? COLORS[hl] : '#c3c9ce') : '#222';
    const pts = ln.pts.map(p=>[FX(p[0]),FY(p[1])]);
    const st = styleOf(ln);
    const dAttr = lineD(pts, st, 5, 14);
    const da = dashFor(st, LWF());
    s += `<path d="${dAttr}"
      fill="none" stroke="${col}" stroke-width="${GLW()}" stroke-linejoin="round" stroke-linecap="round"
      ${da?`stroke-dasharray="${da}"`:''}/>`;
    if(pts.length>1){
      const a=pts[pts.length-2], b=pts[pts.length-1];
      if(ln.e==='a') s += arrowHead(a,b,col,11*Math.sqrt(LWF()));
      else if(ln.e==='o') s += `<circle cx="${b[0]}" cy="${b[1]}" r="${6*Math.sqrt(LWF())}" fill="${col}"/>`;
    }
  }
  for(const pid of ['X','Y','C','Z','Q']){
    const [x,y]=play.pos[pid], cx=FX(x), cy=FY(y);
    const fill = (hl && pid!==hl) ? '#c3c9ce' : COLORS[pid];
    if(pid==='C') s += `<rect x="${cx-13}" y="${cy-13}" width="26" height="26" rx="5" fill="${fill}" stroke="#fff" stroke-width="2.5"/>`;
    else s += `<circle cx="${cx}" cy="${cy}" r="14" fill="${fill}" stroke="#fff" stroke-width="2.5"/>`;
    const lb = LBL(pid);
    s += `<text x="${cx}" y="${cy+(lb.length>1?3.5:5)}" font-size="${lb.length>1?9.5:14}" font-weight="bold" fill="#fff" text-anchor="middle">${esc(lb)}</text>`;
  }
  if(withTexts!==false) for(const tx of (play.texts||[]))
    s += `<text x="${FX(tx.x)}" y="${FY(tx.y)}" font-size="16" font-weight="600" fill="#333"
      text-anchor="middle" stroke="#fff" stroke-width="3" style="paint-order:stroke">${esc(tx.t)}</text>`;
  return s + `</svg>`;
}

function buildFlashPrint(){
  const hl = state.print.pos==='all' ? null : state.print.pos;
  const plays = SLOT().plays;
  let pages = '';
  for(let p=0; p<plays.length; p+=4){

/* ================= Teilen per Link ================= */
function b64FromBytes(bytes){
  let bin=''; const CH=8192;
  for(let i=0;i<bytes.length;i+=CH) bin += String.fromCharCode.apply(null, bytes.subarray(i,i+CH));
  return btoa(bin);
}
document.getElementById('btnShare').onclick = async ()=>{
  const data = JSON.stringify({name:SLOT().name, plays:SLOT().plays, def:SLOT().def});
  let hash;
  try{
    if(window.CompressionStream){
      const stream = new Blob([data]).stream().pipeThrough(new CompressionStream('gzip'));
      const buf = await new Response(stream).arrayBuffer();
      hash = 'd=' + b64FromBytes(new Uint8Array(buf));
    } else {
      hash = 'D=' + btoa(unescape(encodeURIComponent(data)));
    }
  }catch(e){ hash = 'D=' + btoa(unescape(encodeURIComponent(data))); }
  const url = location.href.split('#')[0] + '#' + hash;
  try{
    await navigator.clipboard.writeText(url);
    alert(T('shareCopied'));
  }catch(e){
    prompt('Link:', url);
  }
};
async function loadSharedFromHash(){
  const h = location.hash.slice(1);
  if(!h.startsWith('d=') && !h.startsWith('D=')) return;
  try{
    const bytes = Uint8Array.from(atob(h.slice(2)), c=>c.charCodeAt(0));
    let json;
    if(h[0]==='d'){
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      json = await new Response(stream).text();
    } else {
      json = decodeURIComponent(escape(atob(h.slice(2))));
    }
    const d = JSON.parse(json);
    if(d.plays && d.plays.length && confirm(T('shareLoadQ').replace('{n}', d.name||'?'))){
      state.slots.push({name: d.name||T('shared'), plays:d.plays,
        def: d.def||{preset:'off',players:[],zones:true,v:DEF_V}, cur:0});
      state.slot = state.slots.length-1;
      clearUndo(); render(); save();
    }
    history.replaceState(null, '', location.pathname + location.search);
  }catch(e){}
}

let fcQueue = [], fcFlipped = false, fcTotal = 0;
function fcStart(){
  fcQueue = SLOT().plays.map((_,i)=>i);
  for(let i=fcQueue.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [fcQueue[i], fcQueue[j]] = [fcQueue[j], fcQueue[i]];
  }
  fcTotal = fcQueue.length; fcFlipped = false;
  fcRender();
}
function fcPosVal(){ const v = document.getElementById('fcPos').value; return v==='all' ? null : v; }
function fcRender(){
  const card = document.getElementById('fcCard');
  const show = (id,on)=>document.getElementById(id).style.display = on ? '' : 'none';
  document.getElementById('fcProg').textContent =
    fcQueue.length ? T('fcLeft').replace('{a}', fcQueue.length).replace('{b}', fcTotal) : '';
  if(!fcQueue.length){
    card.innerHTML = `<div class="big">${T('fcDone')}</div>`;
    show('fcFlip',false); show('fcKnew',false); show('fcAgain',false); show('fcRestart',true);
    return;
  }
  const i = fcQueue[0], p = SLOT().plays[i];
  const nameSide = `<div class="big"><span class="num">${i+1}</span><br>${esc(p.name||'Play '+(i+1))}</div>`;
  const playSide = bigPlaySVG(p, false, fcPosVal());
  const dir = document.getElementById('fcDir').value;
  const front = dir==='n2p' ? nameSide : playSide;
  const back  = dir==='n2p' ? playSide : nameSide;
  card.innerHTML = fcFlipped ? back : front;
  show('fcFlip', !fcFlipped); show('fcKnew', fcFlipped); show('fcAgain', fcFlipped); show('fcRestart', false);
}
function fcFillPos(){
  const sel = document.getElementById('fcPos');
  sel.innerHTML = `<option value="all">${T('fcAllPos')}</option>` +
    ['X','Y','C','Z'].map(pid=>`<option value="${pid}">${esc(LBL(pid))}</option>`).join('');
}
document.getElementById('btnFlash').onclick = ()=>{
  fcFillPos();
  document.getElementById('fcOv').classList.add('show');
  fcStart();
};
document.getElementById('fcExit').onclick = ()=>document.getElementById('fcOv').classList.remove('show');
document.getElementById('fcCard').onclick = ()=>{ if(fcQueue.length){ fcFlipped=!fcFlipped; fcRender(); } };
document.getElementById('fcFlip').onclick = ()=>{ fcFlipped=true; fcRender(); };
document.getElementById('fcKnew').onclick = ()=>{ fcQueue.shift(); fcFlipped=false; fcRender(); };
document.getElementById('fcAgain').onclick = ()=>{ fcQueue.push(fcQueue.shift()); fcFlipped=false; fcRender(); };
document.getElementById('fcRestart').onclick = fcStart;
document.getElementById('fcDir').onchange = ()=>{ fcFlipped=false; fcRender(); };
document.getElementById('fcPos').onchange = ()=>fcRender();

/* ================= Gameday-Modus mit Spiel-Sessions & Stats ================= */
const GD_RESULTS = [
  ['c','Catch'],['ctd','Catch TD'],['r','Run'],['rtd','Run TD'],['i','Incomplete'],
  ['d','Drop'],['s','Sack'],['int','INT'],['po','Penalty O'],['pd','Penalty D']
];
let gdCur = -1, gdSel = null;
function gdViewGame(){ return SLOT().game; }           // Zahl = Spiel-ID, 'all' = Gesamt
function statFor(p, gid){
  const es = (p.log||[]).filter(e=> gid==='all' || e.g===gid);
  const n = es.length, eff = es.filter(e=>e.e).length;
  const yds = es.reduce((s,e)=>s+(e.y||0),0);
  const td = es.filter(e=>e.r==='ctd'||e.r==='rtd').length;
  const to = es.filter(e=>e.r==='int').length;
  return {n, eff, yds, avg: n?yds/n:0, td, to};
}
function gdEnsureGame(){
  if(!SLOT().games) SLOT().games = [];
  if(!SLOT().games.length){
    SLOT().games.push({id:1, n:T('gdGameN')+' 1 · '+new Date().toLocaleDateString()});
    SLOT().game = 1;
  }
  if(SLOT().game==null || (SLOT().game!=='all' && !SLOT().games.some(g=>g.id===SLOT().game)))
    SLOT().game = SLOT().games[SLOT().games.length-1].id;
}
function gdFillGameSel(){
  const sel = document.getElementById('gdGame');
  sel.innerHTML = SLOT().games.map(g=>
    `<option value="${g.id}" ${SLOT().game===g.id?'selected':''}>${esc(g.n)}</option>`).join('') +
    `<option value="all" ${SLOT().game==='all'?'selected':''}>${T('gdAll')}</option>`;
}
function gdShowList(){
  gdEnsureGame(); gdFillGameSel();
  document.getElementById('gdDetail').style.display = 'none';
  document.getElementById('gdStats').style.display = 'none';
  document.getElementById('gdGridWrap').style.display = '';
  document.getElementById('gdTitle').textContent = state.teamName+' · '+SLOT().name;
  const gid = gdViewGame();
  const g = document.getElementById('gdGrid');
  g.innerHTML = SLOT().plays.map((p,i)=>{
    const s = statFor(p, gid);
    const st = s.n ? `<span class="pStat">${s.eff}/${s.n} · Ø${s.avg.toFixed(1)}</span>` : '';
    const cc = catColOf(p);
    return `<div class="gdTile" data-i="${i}">${playThumbSVG(p, i+1, null, cc, false)}
      <div class="gdCap"><span class="pNum"${cc?` style="background:${cc}"`:''}>${i+1}</span><span class="nm">${esc(p.name||'Play '+(i+1))}</span>${st}</div></div>`;
  }).join('');
  g.querySelectorAll('.gdTile').forEach(el=> el.onclick = ()=> gdShowDetail(+el.dataset.i));
}
function gdShowDetail(i){
  gdCur = i; gdSel = null;
  const p = SLOT().plays[i];
  document.getElementById('gdGridWrap').style.display = 'none';
  document.getElementById('gdStats').style.display = 'none';
  document.getElementById('gdDetail').style.display = 'block';
  document.getElementById('gdTitle').textContent = (i+1)+' · '+(p.name||'Play '+(i+1));
  document.getElementById('gdField').innerHTML = bigPlaySVG(p, true, null);
  const res = document.getElementById('gdResults');
  if(gdViewGame()==='all'){ res.innerHTML=''; document.getElementById('gdEntry').style.display='none'; return; }
  res.innerHTML = GD_RESULTS.map(([k,lbl])=>`<button data-r="${k}">${lbl}</button>`).join('');
  res.querySelectorAll('button').forEach(b=> b.onclick = ()=> gdPickResult(b.dataset.r));
  document.getElementById('gdEntry').style.display = 'none';
}
function gdAutoEff(r, y){
  if(r==='ctd' || r==='rtd') return 1;
  return y > 7 ? 1 : 0;
}
function gdPickResult(r){
  gdSel = {r, y:0, manual:false};
  document.querySelectorAll('#gdResults button').forEach(b=>
    b.classList.toggle('on', b.dataset.r===r));
  const who = document.getElementById('gdWho');
  who.innerHTML = `<option value="">–</option>` +
    ['X','Y','C','Z','Q'].map(pid=>`<option value="${pid}">${esc(LBL(pid))}</option>`).join('');
  document.getElementById('gdYds').value = 0;
  document.getElementById('gdEntry').style.display = 'block';
  gdUpdateEff();
}
function gdUpdateEff(){
  if(!gdSel) return;
  const y = +document.getElementById('gdYds').value || 0;
  if(!gdSel.manual) gdSel.e = gdAutoEff(gdSel.r, y);
  document.getElementById('gdEffJa').classList.toggle('on', !!gdSel.e);
  document.getElementById('gdEffNein').classList.toggle('on', !gdSel.e);
  document.getElementById('gdEffAuto').textContent = gdSel.manual ? '' : '(auto)';
}
document.getElementById('gdYds').oninput = gdUpdateEff;
document.getElementById('gdEffJa').onclick = ()=>{ if(gdSel){ gdSel.e=1; gdSel.manual=true; gdUpdateEff(); } };
document.getElementById('gdEffNein').onclick = ()=>{ if(gdSel){ gdSel.e=0; gdSel.manual=true; gdUpdateEff(); } };
document.getElementById('gdSave').onclick = ()=>{
  if(!gdSel || gdViewGame()==='all') return;
  const p = SLOT().plays[gdCur]; if(!p) return;
  const entry = {g: gdViewGame(), r: gdSel.r, y: +document.getElementById('gdYds').value||0, e: gdSel.e?1:0};
  const w = document.getElementById('gdWho').value;
  if(w) entry.w = w;
  (p.log = p.log||[]).push(entry);
  save(); gdShowList();
};
document.getElementById('gdCancel').onclick = ()=>{
  gdSel = null;
  document.getElementById('gdEntry').style.display = 'none';
  document.querySelectorAll('#gdResults button').forEach(b=>b.classList.remove('on'));
};
document.getElementById('gdGame').onchange = ev=>{
  SLOT().game = ev.target.value==='all' ? 'all' : +ev.target.value;
  save(); gdShowList();
};
document.getElementById('gdNewGame').onclick = ()=>{
  gdEnsureGame();
  const nr = SLOT().games.length + 1;
  const name = prompt(T('gdNewGameP'), T('gdGameN')+' '+nr+' · '+new Date().toLocaleDateString());
  if(!name) return;
  const id = Math.max(...SLOT().games.map(g=>g.id)) + 1;
  SLOT().games.push({id, n:name});
  SLOT().game = id;
  save(); gdShowList();
};
function gdShowStats(){
  gdEnsureGame(); gdFillGameSel();
  document.getElementById('gdGridWrap').style.display = 'none';
  document.getElementById('gdDetail').style.display = 'none';
  const box = document.getElementById('gdStats');
  box.style.display = 'block';
  const gid = gdViewGame();
  const rows = SLOT().plays.map((p,i)=>({i, p, s:statFor(p,gid)})).filter(r=>r.s.n);
  const tot = rows.reduce((a,r)=>({n:a.n+r.s.n, eff:a.eff+r.s.eff, yds:a.yds+r.s.yds, td:a.td+r.s.td, to:a.to+r.s.to}),
    {n:0,eff:0,yds:0,td:0,to:0});
  box.innerHTML = `<h3 style="margin:4px 0 10px">📊 ${esc(gid==='all'?T('gdAll'):(SLOT().games.find(g=>g.id===gid)||{}).n||'')}</h3>` +
    (rows.length ? `<table class="statTbl">
    <tr><th>#</th><th>Play</th><th>Snaps</th><th>Eff</th><th>%</th><th>Yds</th><th>Ø</th><th>TD</th><th>INT</th></tr>` +
    rows.map(r=>`<tr><td>${r.i+1}</td><td>${esc(r.p.name||'Play '+(r.i+1))}</td><td>${r.s.n}</td>
      <td>${r.s.eff}</td><td>${Math.round(100*r.s.eff/r.s.n)}%</td><td>${r.s.yds}</td>
      <td>${r.s.avg.toFixed(1)}</td><td>${r.s.td}</td><td>${r.s.to}</td></tr>`).join('') +
    `<tr class="sum"><td></td><td>Σ</td><td>${tot.n}</td><td>${tot.eff}</td>
      <td>${tot.n?Math.round(100*tot.eff/tot.n):0}%</td><td>${tot.yds}</td>
      <td>${tot.n?(tot.yds/tot.n).toFixed(1):'0'}</td><td>${tot.td}</td><td>${tot.to}</td></tr>
    </table>` : `<p class="lbl" style="color:var(--dim)">${T('gdNoData')}</p>`);
}
document.getElementById('gdStatsBtn').onclick = ()=>{
  if(document.getElementById('gdStats').style.display==='block') gdShowList();
  else gdShowStats();
};
document.getElementById('btnGameday').onclick = ()=>{
  document.getElementById('gdOv').classList.add('show'); gdShowList();
};
document.getElementById('gdExit').onclick = ()=>{
  document.getElementById('gdOv').classList.remove('show'); render();
};
document.getElementById('gdBack').onclick = gdShowList;
document.getElementById('gdReset').onclick = ()=>{
  if(!confirm(T('gdResetQ2'))) return;
  const gid = gdViewGame();
  SLOT().plays.forEach(p=>{
    if(!p.log) return;
    p.log = gid==='all' ? [] : p.log.filter(e=>e.g!==gid);
  });
  save();
  if(document.getElementById('gdStats').style.display==='block') gdShowStats(); else gdShowList();
};

/* Sprachumschalter */
document.getElementById('btnLang').onclick = ()=>{
  state.lang = state.lang==='de' ? 'en' : 'de';
  applyLang();
  if(document.getElementById('printOv').classList.contains('show')) refreshPrintUI();
  render(); save();
};

/* ================= Startseite / Navigation ================= */
function showView(v){
  state.view = v;
  document.getElementById('homeView').classList.toggle('show', v==='home');
  document.getElementById('app').style.display = v==='home' ? 'none' : 'flex';
  if(v==='home') renderHome();
}
function renderHome(){
  renderSlots();
  document.getElementById('homeTitle').textContent = '🏈 '+state.teamName+' – '+SLOT().name;
  const lg = document.getElementById('homeLogo');
  if(state.logo){ lg.src = state.logo; lg.style.display = ''; } else lg.style.display = 'none';
  const g = document.getElementById('homeGrid');
  g.innerHTML = SLOT().plays.map((p,i)=>{
    const sp = statFor(p,'all');
    const st = sp.n ? `<span class="pStat">${sp.eff}/${sp.n}</span>` : '';
    const cc = catColOf(p);
    return `<div class="gdTile" data-i="${i}">${playThumbSVG(p, i+1, null, cc, false)}
      <div class="gdCap"><span class="pNum"${cc?` style="background:${cc}"`:''}>${i+1}</span><span class="nm">${esc(p.name||'Play '+(i+1))}</span>${st}</div></div>`;
  }).join('') + `<div class="homeAdd" id="homeAdd" title="${esc(T('newPlay'))}">＋</div>`;
  g.querySelectorAll('.gdTile').forEach(el=> el.onclick = ()=>{
    SLOT().cur = +el.dataset.i; state.selP=null; state.selH=null; state.selD=null;
    showView('editor'); render(); save();
  });
  document.getElementById('homeAdd').onclick = ()=>{
    document.getElementById('btnNew').click(); showView('editor');
  };
}
document.getElementById('btnGoEdit').onclick = ()=>{ showView('editor'); render(); };
document.getElementById('btnHomeNav').onclick = ()=>showView('home');

applyLang();
render();
showView('home');
loadSharedFromHash();
</script>
